{% extends "base.html" %}
{% block title %}Sign Up | Allocare{% endblock %}
{% block content %}
<div class="auth-card reveal delay-1">
    <header class="auth-header">
        <h2>Create account</h2>
        <p>Set up your Allocare access in under a minute.</p>
    </header>

    <form method="post" class="auth-form">
        <div class="field">
            <label class="sr-only" for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required>
        </div>

        <div class="field">
            <label class="sr-only" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Password" required>
            <button type="button" class="field-icon" data-toggle-password data-target="password" aria-label="Show password">
                <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 3l18 18" />
                    <path d="M10.6 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a19.6 19.6 0 0 1-3.5 4.9" />
                    <path d="M6.6 6.6A19.7 19.7 0 0 0 2 12s3.5 7 10 7a11 11 0 0 0 3-.4" />
                    <path d="M9.5 9.5A3 3 0 0 0 14.5 14.5" />
                </svg>
            </button>
        </div>

        <div class="field">
            <label class="sr-only" for="confirm_password">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" placeholder="Confirm password" required>
            <button type="button" class="field-icon" data-toggle-password data-target="confirm_password" aria-label="Show password">
                <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 3l18 18" />
                    <path d="M10.6 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a19.6 19.6 0 0 1-3.5 4.9" />
                    <path d="M6.6 6.6A19.7 19.7 0 0 0 2 12s3.5 7 10 7a11 11 0 0 0 3-.4" />
                    <path d="M9.5 9.5A3 3 0 0 0 14.5 14.5" />
                </svg>
            </button>
        </div>

        <div class="auth-footer">
            <button type="submit">Sign Up</button>
            <p class="helper">Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
        </div>
    </form>
</div>
{% endblock %}
